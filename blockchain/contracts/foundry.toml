# Build-time only: compile Good.sol with the right solc / EVM version and produce
# verification input. Deployment is done from Node (scripts/deploy.js).
# OpenZeppelin is resolved from npm via the remapping below — no git submodule
# (run `npm install` in blockchain/ first).
[profile.default]
src = "src"
out = "out"
libs = ["../node_modules"]
evm_version = "prague"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=../node_modules/@openzeppelin/contracts/",
]
