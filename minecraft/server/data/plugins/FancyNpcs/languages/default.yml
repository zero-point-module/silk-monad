  # Commands (npc attribute)
  npc_attribute_set: "Attribute {primaryColor}{attribute}{secondaryColor} has been set to {primaryColor}{value}{secondaryColor}."
  npc_attribute_set_invalid_for_this_entity_type: "{errorColor}Attribute {primaryColor}{input}{errorColor} is not valid attribute for this entity type."
  npc_attribute_list_header: "<dark_gray><st>--------------------</st>  {secondaryColor}Attributes  <dark_gray><st>--------------------</st><newline>"
  npc_attribute_list_entry: " <#848484>{attribute}<dark_gray>: {primaryColor}{value}"
  npc_attribute_list_footer: "<newline><dark_gray><st>---------------------------------------------------</st>"
  npc_attribute_list_failure_empty: "{errorColor}There are no attributes set. Use {primaryColor}/npc attribute (npc) set (attribute) (value){errorColor} to set an attribute."

  # Commands (npc collidable)
  npc_collidable_set_true: "NPC {primaryColor}{npc}{secondaryColor} is now collidable{secondaryColor}."
  npc_collidable_set_false: "NPC {primaryColor}{npc}{secondaryColor} is no longer collidable{secondaryColor}."

  # Commands (npc copy)
  npc_copy_success: "NPC {primaryColor}{npc}{secondaryColor} has been copied to {primaryColor}{new_npc}{secondaryColor}."

  # Commands (npc create)
  npc_create_success: "NPC {primaryColor}{npc}{secondaryColor} has been created."
