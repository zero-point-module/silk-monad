  npc_equipment_set_empty: "Equipment slot {primaryColor}{slot}{secondaryColor} has been removed."
  npc_equipment_set_failure_invalid_slot: "{errorColor}Argument {primaryColor}{input}{errorColor} is not a valid equipment slot."
  npc_equipment_clear_success: "Equipment has been cleared."
  npc_equipment_list_header: "<dark_gray><st>--------------------</st>  {secondaryColor}Equipment  <dark_gray><st>--------------------</st><newline>"
  npc_equipment_list_entry: " <#848484>{slot}<dark_gray>: <reset><item>"
