site_name: mindcraft-ce
site_description: Crafting minds for Minecraft with LLMs and Mineflayer.
site_url: https://mindcraft-ce.com/
repo_url: https://github.com/mindcraft-ce/mindcraft-ce
repo_name: mindcraft-ce/mindcraft-ce

theme:
  name: material
  logo: https://avatars.githubusercontent.com/u/215349210
  favicon: https://avatars.githubusercontent.com/u/215349210?s=64
  palette:
    scheme: slate
    primary: custom
    accent: teal
  
  icon:
    repo: fontawesome/brands/github
      
  features:
    - content.code.copy
    - content.code.annotate
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/mindcraft-ce/mindcraft-ce

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
  - tables
  - mkdocs-click
  - markdown_gfm_admonition
  - mdx_truly_sane_lists:
      nested_indent: 2
      truly_sane: true

nav:
  - Home: index.md
  - FAQ: FAQ.md
  - Andy Models: andy.md
  - MineCollab: minecollab.md

extra_css:
  - style.css
