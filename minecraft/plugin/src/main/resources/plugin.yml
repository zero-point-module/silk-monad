name: SilkMonad
version: '${version}'
main: com.silkmonad.SilkMonadPlugin
api-version: '1.21'
description: Custom cosmetics framework for the silk-monad server
authors: [silk-monad]
commands:
  silk:
    description: SilkMonad root command
    usage: |
      /silk give <cosmetic-id> [player]
      /silk apply <cosmetic-id> [player]
      /silk remove <cosmetic-id> [player]
      /silk list [type]
      /silk reload
      /silk wallet set <0x...>
      /silk wallet set <player> <0x...>
      /silk wallet clear [player]
      /silk wallet show [player]
      /silk wallet refresh [player]
      /silk crowd [count]
      /silk crowd clear
    permission: silkmonad.use
  uuid:
    description: Print the UUID of a past-connected player
    usage: /uuid <player>
    permission: silkmonad.uuid
permissions:
  silkmonad.use:
    description: Use SilkMonad commands
    default: true
  silkmonad.uuid:
    description: Use /uuid to look up UUIDs
    default: op
  silkmonad.wallet.self:
    description: Link your own Monad wallet
    default: true
  silkmonad.wallet.others:
    description: Link or clear another player's Monad wallet
    default: op
  silkmonad.wallet.show:
    description: Show any player's linked wallet
    default: true
  silkmonad.crowd:
    description: Spawn the ambient villager crowd
    default: op
