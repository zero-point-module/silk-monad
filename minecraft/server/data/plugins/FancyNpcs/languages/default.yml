# ========================================================================
# THIS FILE IS A TEMPLATE, ANY MODIFICATIONS MADE HERE MAY NOT BE APPLIED.
# ========================================================================
# HOW TO CREATE CUSTOM LANGUAGE:
#   1. Copy this file and name it eg. "en.yml"
#   2. Change "language_name" property to eg. "english" and update "language" property inside config.yml to match this value.
#   3. Modify contents to your liking.
#   4. Reload the plugin using "/fancynpcs reload" command.
# ========================================================================

# Language name. This value can be used to specify "language" property in the config.yml file.
language_name: default

# Messages support MiniMessage formatting: https://docs.advntr.dev/minimessage/format.html
messages:
  # Common (States)
  true: "{successColor}True"
  enabled: "{successColor}Enabled"
  false: "{errorColor}False"
  disabled: "{errorColor}Disabled"

  # Common (Equipment Slots)
  main_hand: "Main Hand"
  off_hand: "Off Hand"
  head: "Head"
  chest: "Chest"
  legs: "Legs"
  feet: "Feet"

  # Common (Availability)
  unknown: "Unknown"
  not_available: "N/A"

  # Common (Visibility)
  always_visible: "Always Visible"
  not_visible: "Not Visible"

  # Common (Default Values)
  default: "Default ({value})"

  # Common (Colors)
  color_black: "<dark_gray>Black"
  color_dark_blue: "<dark_blue>Dark Blue"
  color_dark_green: "<dark_green>Dark Green"
  color_dark_aqua: "<dark_aqua>Dark Aqua"
  color_dark_red: "<dark_red>Dark Red"
  color_dark_purple: "<dark_purple>Dark Purple"
  color_gold: "<gold>Gold"
  color_gray: "Gray"
  color_dark_gray: "<dark_gray>Dark Gray"
  color_blue: "<blue>Blue"
  color_green: "<green>Green"
  color_aqua: "<aqua>Aqua"
  color_red: "<red>Red"
  color_light_purple: "<light_purple>Light Purple"
  color_yellow: "<yellow>Yellow"
  color_white: "<white>White"

  # Common (Other)
  interaction_on_cooldown: "{errorColor}You're currently on cooldown. {primaryColor}{time}{errorColor} remaining."
  action_missing_permissions: "{errorColor}Insufficient permissions. You cannot perform this action."
  action_missing_item: "{errorColor}You must have at least x{amount} of {item} to perform this action."
  player_npcs_cannot_modify_npc: "{errorColor}You can only modify NPCs you own."
  player_npcs_cannot_move_npc: "{errorColor}You are only allowed to teleport NPCs to your plot."
  player_npcs_create_failure_limit_reached: "{errorColor}You have reached maximum number of NPCs."
  player_npcs_create_failure_not_owned_plot: "{errorColor}You can only create NPCs on your plot."

  # Common (Player command as op warning)
  player_command_as_op_warning: "{warningColor}<b>ATTENTION:</b>{secondaryColor} Hi admin, there are npcs on this server that use the “player_command_as_op” action, which temporarily grants operator status to a player during command execution. This poses a security risk and should not be used. Please change these actions to “player_command” (ASAP) and ensure that the player has necessary permissions to execute the command without operator status. The ”player_command_as_op” action will be removed in a future update."
  player_command_as_op_warning_affected: "{secondaryColor}The following npcs are affected by this: {warningColor}{affected_npcs}"

  # Commands (Common Replies)
  command_missing_permissions: "{errorColor}Insufficient permissions. You cannot use this command."
  command_wrong_usage: "{errorColor}This sub-command does not exist. Use {primaryColor}/npc help{errorColor} to view available commands."
  command_incomplete_usage: "{errorColor}Incomplete command. Use {primaryColor}/npc help{errorColor} to view correct syntax."
  command_player_only: "{errorColor}This command can only be executed by in-game players."
  command_invalid_boolean: "{errorColor}Argument {primaryColor}{input}{errorColor} must be either {primaryColor}true{errorColor} or {primaryColor}false{errorColor}."
  command_invalid_number: "{errorColor}Argument {primaryColor}{input}{errorColor} is not a valid number."
  command_invalid_location: "{errorColor}Argument {primaryColor}{input}{errorColor} is not a valid location."
  command_invalid_world: "{errorColor}World named {primaryColor}{input}{errorColor} does not exist or is not loaded."
  command_invalid_glowing_color: "{errorColor}Argument named {primaryColor}{input}{errorColor} is not a valid glowing color."
  command_invalid_npc_visibility: "{errorColor}Argument named {primaryColor}{input}{errorColor} is not a valid visibility type."
  command_invalid_list_sort_type: "{errorColor}Argument named {primaryColor}{input}{errorColor} is not a valid sort type."
  command_invalid_nearby_sort_type: "{errorColor}Argument named {primaryColor}{input}{errorColor} is not a valid sort type."
  command_invalid_entity_type: "{errorColor}Argument named {primaryColor}{input}{errorColor} is not a valid entity type."
  command_invalid_action_trigger: "{errorColor}Argument named {primaryColor}{input}{errorColor} is not a valid action trigger."
  command_invalid_action_type: "{errorColor}Argument named {primaryColor}{input}{errorColor} is not a valid action type."
  command_invalid_npc: "{errorColor}NPC {primaryColor}{input}{errorColor} does not exist."
  command_invalid_material: "{errorColor}Argument {primaryColor}{input}{errorColor} is not a valid material."
  command_invalid_attribute: "{errorColor}Specified value {primaryColor}{input}{errorColor} is not a valid attribute."
  command_invalid_attribute_value: "{errorColor}Specified value {primaryColor}{input}{errorColor} is not valid for this attribute."
  command_invalid_equipment_slot: "{errorColor}Argument {primaryColor}{input}{errorColor} is not a valid slot."
  command_invalid_interval: "{errorColor}Argument {primaryColor}{input}{errorColor} is not a valid duration of time."
  command_invalid_enum_generic: "{errorColor}Argument {primaryColor}{input}{errorColor} is not a valid {enum}."
  command_unsupported_npc_type: "{errorColor}This NPC type does not support this feature."
  command_input_contains_blocked_command: "{errorColor}This command is not allowed for use in interactions."
  command_npc_modification_cancelled: "{errorColor}NPC modification has been cancelled by the API."

  # Generic Syntax Message (syntax is provided by Cloud and may not be human-friendly)
  command_invalid_syntax_generic: "Syntax: {primaryColor}/{syntax}"

  # Command Syntaxes
  command_syntax:
    fancynpcs: "Syntax: {primaryColor}/fancynpcs {secondaryColor}(version | reload | save | feature_flags)"
    npc: "{errorColor}Unknown command. Use {primaryColor}/npc help{errorColor} to view available commands."
    npc_action: "Syntax: {primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}(add | add_after | add_before | clear | list | move_down | move_up | remove | set)"
    npc_action_add: "Syntax: {primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}add {secondaryColor}(type) [value]"
    npc_action_add_after: "Syntax: {primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}add_after {secondaryColor}(index) (type) [value]"
    npc_action_add_before: "Syntax: {primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}add_before {secondaryColor}(index) (type) [value]"
    npc_action_remove: "Syntax: {primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}remove {secondaryColor}(number)"
    npc_action_move_down: "Syntax: {primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}move_down {secondaryColor}(index)"
    npc_action_move_up: "Syntax: {primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}move_down {secondaryColor}(index)"
    npc_action_set: "Syntax: {primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}set {secondaryColor}(index) (type) [value]"
    npc_attribute: "Syntax: {primaryColor}/npc attribute {secondaryColor}(npc) {primaryColor}(set | list)"
    npc_attribute_set: "Syntax: {primaryColor}/npc attribute {secondaryColor}(npc) {primaryColor}set {secondaryColor}(attribute) (value)"
    npc_center: "Syntax: {primaryColor}/npc center {secondaryColor}(npc)"
    npc_collidable: "Syntax: {primaryColor}/npc collidable {secondaryColor}(npc) (state)"
    npc_copy: "Syntax: {primaryColor}/npc copy {secondaryColor}(npc) (new_name)"
    npc_create: "Syntax: {primaryColor}/npc create {secondaryColor}(npc) [--type] [--position] [--world]"
    npc_displayname: "Syntax: {primaryColor}/npc displayname {secondaryColor}(npc) (name)"
    npc_equipment: "Syntax: {primaryColor}/npc equipment {secondaryColor}(npc) {primaryColor}(set | clear | list)"
    npc_equipment_set: "Syntax: {primaryColor}/npc equipment {secondaryColor}(npc) {primaryColor}set {secondaryColor}(slot) (@hand | @none | item)"
    npc_glowing: "Syntax: {primaryColor}/npc glowing {secondaryColor}(npc) (disabled | color)"
    npc_info: "Syntax: {primaryColor}/npc info {secondaryColor}(npc)"
    npc_interaction_cooldown: "Syntax: {primaryColor}/npc interaction_cooldown {secondaryColor}(npc) (disabled | time)"
    npc_scale: "Syntax: {primaryColor}/npc scale {secondaryColor}(npc) (factor)"
    npc_list: "Syntax: {primaryColor}/npc list {secondaryColor}[filters...]"
    npc_move_here: "Syntax: {primaryColor}/npc move_here {secondaryColor}(npc)"
    npc_move_to: "Syntax: {primaryColor}/npc move_to {secondaryColor}(npc) (x) (y) (z) [world]"
    npc_nearby: "Syntax: {primaryColor}/npc nearby {secondaryColor}[filters...]"
    npc_remove: "Syntax: {primaryColor}/npc remove {secondaryColor}(npc)"
    npc_rotate: "Syntax: {primaryColor}/npc rotate {secondaryColor}(npc) (yaw) (pitch)"
    npc_show_in_tab: "Syntax: {primaryColor}/npc show_in_tab {secondaryColor}(npc) (state)"
    npc_skin: "Syntax: {primaryColor}/npc skin {secondaryColor}(npc) (@none | @mirror | name | uuid | placeholder | url | file name) [--slim]"
    npc_teleport: "Syntax: {primaryColor}/npc teleport {secondaryColor}(npc)"
    npc_turn_to_player: "Syntax: {primaryColor}/npc turn_to_player {secondaryColor}(npc) (state)"
    npc_turn_to_player_distance: "Syntax: {primaryColor}/npc turn_to_player_distance {secondaryColor}(npc) (state)"
    npc_type: "Syntax: {primaryColor}/npc type {secondaryColor}(npc) (type)"
    npc_visibility: "Syntax: {primaryColor}/npc visibility {secondaryColor}(npc) (all | permission_required | manual)"
    npc_visibility_distance: "Syntax: {primaryColor}/npc visibility_distance {secondaryColor}(npc) (always_visible | default | not_visible | distance)"

  # Commands (fancynpcs)
  fancynpcs_reload_success: "{successColor}Plugin has been reloaded."
  fancynpcs_save_success: "{successColor}NPCs have been saved."
  fancynpcs_feature_flags_header: "<dark_gray><st>-------------------</st>   {secondaryColor}Feature Flags  <dark_gray><st>------------------</st><newline>"
  fancynpcs_feature_flags_entry: " <#848484>{number}. {primaryColor}{name} <#848484>({id})<dark_gray>: {state}"
  fancynpcs_feature_flags_footer: "<newline><dark_gray><st>-------------</st>  {secondaryColor}Showing total of {primaryColor}{total_formatted}{secondaryColor} entries  <dark_gray><st>-------------</st>"
  fancynpcs_test_success: "{successColor}All {count} tests have passed successfully (ran by {player} at {time})."
  fancynpcs_test_failure: "{errorColor}Some tests have failed (ran by {player} at {time})."
  fancynpcs_skin_system_restart_schedulers_success: "{successColor}Skin schedulers have been restarted."
  fancynpcs_skin_system_scheduler_status: "{successColor}Status ({scheduler}): {status}"
  fancynpcs_skin_system_clear_queues_success: "{successColor}Skin generation queues have been cleared."
  fancynpcs_skin_system_clear_cache_success: "{successColor}Skin cache has been cleared."
  fancynpcs_skin_system_clear_uuid_cache_success: "{successColor}UUID cache has been cleared."

  # Commands (npc help)
  npc_help_page_header: "<dark_gray><st>-------------</st>  {primaryColor}FancyNpcs{secondaryColor} Commands ({primaryColor}{page}{secondaryColor}/{primaryColor}{max_page}{secondaryColor})  <dark_gray><st>--------------</st><newline>"
  npc_help_page_footer: "<newline><dark_gray><st>-----------</st>  {secondaryColor}Click {primaryColor}<click:OPEN_URL:https://fancyinnovations.com/docs/minecraft-plugins/fancynpcs/commands/npc>here</click>{secondaryColor} to open documentation  <dark_gray><st>-----------</st>"
  npc_help_contents:
    - "<hover:show_text:'{secondaryColor}Adds new action to the list.'>{primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}add {secondaryColor}(index) [value]"
    - "<hover:show_text:'{secondaryColor}Adds new action to the list after specified position.'>{primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}add_after {secondaryColor}(index) [value]"
    - "<hover:show_text:'{secondaryColor}Adds new action to the list before specified position.'>{primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}add_before {secondaryColor}(index) [value]"
    - "<hover:show_text:'{secondaryColor}Clears all actions of the specified trigger.'>{primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}clear"
    - "<hover:show_text:'{secondaryColor}Lists all actions of the specified trigger.'>{primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}list"
    - "<hover:show_text:'{secondaryColor}Moves action at specified index down in the list.'>{primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}move_down {secondaryColor}(index)"
    - "<hover:show_text:'{secondaryColor}Moves action at specified index up in the list.'>{primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}move_up {secondaryColor}(index)"
    - "<hover:show_text:'{secondaryColor}Removes action from the list.'>{primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}remove {secondaryColor}(index)"
    - "<hover:show_text:'{secondaryColor}Adds new action to the list at specified position.'>{primaryColor}/npc action {secondaryColor}(npc) (trigger) {primaryColor}set {secondaryColor}(index) [value]"
    - "<hover:show_text:'{secondaryColor}Sets an attribute of the NPC.'>{primaryColor}/npc attribute {secondaryColor}(npc) {primaryColor}set {secondaryColor}(attribute) (value)"
    - "<hover:show_text:'{secondaryColor}Lists all modified attributes of the NPC.'>{primaryColor}/npc attribute {secondaryColor}(npc) {primaryColor}list"
    - "<hover:show_text:'{secondaryColor}Changes whether the NPC can collide with other entities.'>{primaryColor}/npc collidable {secondaryColor}(npc) [state]"
    - "<hover:show_text:'{secondaryColor}Copies (duplicates) specified NPC.'>{primaryColor}/npc copy {secondaryColor}(npc) (new_name)"
    - "<hover:show_text:'{secondaryColor}Centers the NPC on its current block location.'>{primaryColor}/npc center {secondaryColor}(npc)"
    - "<hover:show_text:'{secondaryColor}Creates a new NPC. Can be customized with flags.'>{primaryColor}/npc create {secondaryColor}(npc) [--type] [--location] [--world]"
    - "<hover:show_text:'{secondaryColor}Changes displayname of the NPC. Supports MiniMessage, PlaceholderAPI and MiniPlaceholders.'>{primaryColor}/npc displayname {secondaryColor}(npc) (name)"
    - "<hover:show_text:'{secondaryColor}Sets equipment slot of the NPC to item currently held in main hand, none or a specific item type.'>{primaryColor}/npc equipment {secondaryColor}(npc) {primaryColor}set {secondaryColor}(slot) (@hand | @none | item)"
    - "<hover:show_text:'{secondaryColor}Clears all equipment slots of the NPC.'>{primaryColor}/npc equipment {secondaryColor}(npc) {primaryColor}clear"
    - "<hover:show_text:'{secondaryColor}Lists all equipment of the NPC.'>{primaryColor}/npc equipment {secondaryColor}(npc) {primaryColor}list"
    - "<hover:show_text:'{secondaryColor}Changes glowing state and color of the NPC.'>{primaryColor}/npc glowing {secondaryColor}(npc) (disabled | color)"
    - "<hover:show_text:'{secondaryColor}Shows information about specified NPC.'>{primaryColor}/npc info {secondaryColor}(npc)"
    - "<hover:show_text:'{secondaryColor}Changes duration between interactions (cooldown) of the NPC.'>{primaryColor}/npc interaction_cooldown {secondaryColor}(npc) (disabled | time)"
    - "<hover:show_text:'{secondaryColor}Lists all NPCs in all worlds. Can be filtered and sorted.'>{primaryColor}/npc list {secondaryColor}[--type] [--sort]"
    - "<hover:show_text:'{secondaryColor}Teleports specified NPC to your location.'>{primaryColor}/npc move_here {secondaryColor}(npc)"
    - "<hover:show_text:'{secondaryColor}Teleports NPC to specified location.'>{primaryColor}/npc move_to {secondaryColor}(npc) (x) (y) (z) [world]"
    - "<hover:show_text:'{secondaryColor}Lists all NPCs in your world. Can be filtered and sorted.'>{primaryColor}/npc nearby {secondaryColor}[--radius] [--type] [--sort]"
    - "<hover:show_text:'{secondaryColor}Removes (deletes) specified NPC.'>{primaryColor}/npc remove {secondaryColor}(npc)"
    - "<hover:show_text:'{secondaryColor}Changes the rotation (yaw and pitch) of the NPC.'>{primaryColor}/npc rotate {secondaryColor}(npc) (yaw) (pitch)"
    - "<hover:show_text:'{secondaryColor}Changes the scale of the size of the NPC.'>{primaryColor}/npc scale {secondaryColor}(npc) (factor)"
    - "<hover:show_text:'{secondaryColor}Changes whether the NPC is shown in the player-list. This works only on NPCs of PLAYER type.<newline><newline>{errorColor}Re-connecting to the server might be required for changes to take effect.'>{primaryColor}/npc show_in_tab {secondaryColor}(npc) (state)"
    - "<hover:show_text:'{secondaryColor}Changes skin of the NPC.<newline>{secondaryColor}Supports PlaceholderAPI and MiniPlaceholders.<newline><newline>{primaryColor}@none <dark_gray>- {secondaryColor}removes the skin<newline>{primaryColor}@mirror <dark_gray>- {secondaryColor}mirrors player skin<newline>{primaryColor}(name) <dark_gray>- {secondaryColor}name of any player<newline>{primaryColor}(url) <dark_gray>- {secondaryColor}url of the skin texture'>{primaryColor}/npc skin {secondaryColor}(npc) (@none | @mirror | name | url) [--slim]"
    - "<hover:show_text:'{secondaryColor}Teleports you to the specified NPC.'>{primaryColor}/npc teleport {secondaryColor}(npc)"
    - "<hover:show_text:'{secondaryColor}Changes whether the NPC should turn to the player when in range.'>{primaryColor}/npc turn_to_player {secondaryColor}(npc) (state)"
    - "<hover:show_text:'{secondaryColor}Changes the distance at which the NPC should turn to the player.'>{primaryColor}/npc turn_to_player_distance {secondaryColor}(npc) (distance)"
    - "<hover:show_text:'{secondaryColor}Changes the type of the NPC.'>{primaryColor}/npc type {secondaryColor}(npc) (type)"
    - "<hover:show_text:'{secondaryColor}Changes the visibility mode of the NPC. Controls who can see this NPC.'>{primaryColor}/npc visibility {secondaryColor}(npc) (all | permission_required | manual)"
    - "<hover:show_text:'{secondaryColor}Changes the visibility distance of the NPC.'>{primaryColor}/npc visibility_distance {secondaryColor}(npc) (default | distance | ...)"

  # Commands (npc action)
  npc_action_add_success: "Action has been added. There are {primaryColor}{total}{secondaryColor} actions in total."
  npc_action_add_before_success: "Action has been added before action {primaryColor}{number}{secondaryColor}. There are {primaryColor}{total}{secondaryColor} actions in total."
  npc_action_add_after_success: "Action has been added after action {primaryColor}{number}{secondaryColor}. There are {primaryColor}{total}{secondaryColor} actions in total."
  npc_action_add_op_warning: "{warningColor}<b>ATTENTION:</b> {secondaryColor}The “player_command_as_op” action is deprecated, because it temporarily grants operator status to a player during command execution. This poses a security risk and should not be used. Please use the “player_command” action and ensure that the player has necessary permissions to execute the command without operator status. If you have existing NPCs using the “player_command_as_op” action, change them to “player_command” as soon as possible to avoid potential security vulnerabilities. The ”player_command_as_op” action will be removed in a future update."
