    - "<hover:show_text:'{secondaryColor}Unique, permanent identifier of the NPC.'><#848484>Identifier</hover>: <hover:show_text:'{secondaryColor}Click to copy UUID to clipboard.'><click:copy_to_clipboard:'{id}'>{primaryColor}{id}</click></hover>"
    - "<hover:show_text:'{secondaryColor}Identifier of player who created this NPC.'>{secondaryColor}Creator</hover>: <hover:show_text:'{secondaryColor}Click to copy creator UUID to clipboard.'><click:copy_to_clipboard:'{creator_uuid}'>{primaryColor}{creator_uuid_short}{secondaryColor} ({creator_name})</click></hover>"
