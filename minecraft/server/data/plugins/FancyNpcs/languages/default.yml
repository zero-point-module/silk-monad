  npc_action_move_up_success: "Action trigger {primaryColor}{number}{secondaryColor} has been moved up."
  npc_action_move_up_failure: "{errorColor}Action trigger {primaryColor}{number}{errorColor} is already at the top."
  npc_action_move_down_success: "Action trigger {primaryColor}{number}{secondaryColor} has been moved down."
  npc_action_move_down_failure: "{errorColor}Action trigger {primaryColor}{number}{errorColor} is already at the bottom."
  npc_action_requires_value: "{errorColor}You must specify a value for this action."
  npc_action_remove_success: "Action trigger {primaryColor}{number}{secondaryColor} has been removed. There are {primaryColor}{total}{secondaryColor} actions in total."
